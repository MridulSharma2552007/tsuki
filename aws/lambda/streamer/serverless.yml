service: tsuki-streamer

frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.11
  region: ap-south-1

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: true
    layer: true

functions:
  api:
    name: tsuki-streamer
    handler: handler.lambda_handler
    timeout: 30
    memorySize: 1024
    layers:
      - { Ref: PythonRequirementsLambdaLayer }
